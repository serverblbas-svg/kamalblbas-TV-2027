<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMAL PRO ULTRA - IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --bg-light: #141414;
            --bg-card: #1a1a1a;
            --bg-hover: #222222;
            --bg-active: #ffffff;
            --border: #2a2a2a;
            --border-active: #ff3333;
            --text: #ffffff;
            --text-muted: #888888;
            --text-dark: #555555;
            --accent: #ff3333;
            --accent-glow: rgba(255, 51, 51, 0.3);
            --green: #00c853;
            --blue: #2962ff;
            --orange: #ff9800;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ========== TOP NAVBAR ========== */
        .navbar {
            height: 60px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 25px;
            gap: 30px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.5rem;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .nav-btn {
            padding: 8px 24px;
            border-radius: 25px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            color: var(--text);
            background: var(--bg-card);
        }

        .nav-btn.active {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .categories-btn {
            padding: 8px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .categories-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .categories-btn.active {
            background: var(--bg-active);
            color: #000;
            border-color: var(--bg-active);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .nav-icon:hover {
            background: var(--bg-card);
            color: var(--text);
        }

        /* ========== MAIN LAYOUT ========== */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ========== GROUPS SIDEBAR (Left side - like image 3) ========== */
        .groups-sidebar {
            width: 320px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .groups-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .groups-search {
            flex: 1;
            position: relative;
        }

        .groups-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .groups-search input::placeholder {
            color: var(--text-muted);
        }

        .groups-search i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .groups-list::-webkit-scrollbar {
            width: 5px;
        }

        .groups-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .group-row {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .group-row:hover {
            background: var(--bg-card);
        }

        .group-row.active {
            background: var(--bg-card);
            border-right: 3px solid var(--accent);
        }

        .group-flag {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 30px;
        }

        .group-icon {
            color: var(--orange);
            font-size: 0.9rem;
        }

        .group-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .group-count {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Favorites row special */
        .group-row.favorites .group-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-row.favorites .heart-icon {
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* ========== CHANNEL LIST (Middle) ========== */
        .channel-sidebar {
            width: 420px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channel-count {
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-list::-webkit-scrollbar {
            width: 5px;
        }

        .channel-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .channel-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            gap: 12px;
            position: relative;
            border: 2px solid transparent;
        }

        .channel-row:hover {
            background: var(--bg-card);
        }

        .channel-row.active {
            background: var(--bg-active);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), 0 4px 15px rgba(255, 51, 51, 0.2);
            transform: scale(1.02);
            z-index: 2;
        }

        .channel-row.active .ch-number,
        .channel-row.active .ch-name {
            color: #000;
            font-weight: 700;
        }

        .channel-row.active .ch-settings {
            color: #000;
        }

        .ch-number {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 35px;
            text-align: center;
        }

        .ch-logo {
            width: 50px;
            height: 35px;
            border-radius: 6px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ch-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 3px;
        }

        .ch-logo i {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .ch-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-settings {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            opacity: 0;
        }

        .channel-row:hover .ch-settings {
            opacity: 1;
        }

        .channel-row.active .ch-settings {
            opacity: 1;
        }

        .ch-settings:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        /* ========== RIGHT CONTENT (Player + EPG) ========== */
        .right-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
            min-width: 0;
        }

        /* Player Area */
        .player-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            gap: 20px;
        }

        .player-placeholder i {
            font-size: 4rem;
            color: var(--text-dark);
        }

        .player-placeholder-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .loading-dots .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .loading-dots .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Player Controls Overlay */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 40px 20px 15px;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-area:hover .player-controls {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .ctrl-btn:hover {
            background: var(--accent);
            transform: scale(1.1);
        }

        .vol-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* ========== EPG SECTION ========== */
        .epg-area {
            height: 280px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .epg-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .epg-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .epg-title i {
            color: var(--accent);
        }

        .epg-channel-name {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 600;
        }

        .epg-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .epg-list::-webkit-scrollbar {
            width: 5px;
        }

        .epg-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .epg-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-radius: 10px;
            gap: 20px;
            transition: all 0.3s;
            border-right: 3px solid transparent;
        }

        .epg-row:hover {
            background: var(--bg-hover);
            border-right-color: var(--accent);
        }

        .epg-row.current {
            background: rgba(255, 51, 51, 0.1);
            border-right-color: var(--accent);
        }

        .epg-time {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            min-width: 100px;
            font-family: 'Courier New', monospace;
        }

        .epg-program {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 500;
        }

        .epg-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }

        .epg-status.live {
            background: rgba(0, 200, 83, 0.15);
            color: var(--green);
            border: 1px solid rgba(0, 200, 83, 0.3);
        }

        .epg-status.next {
            background: var(--bg-hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* Empty EPG */
        .epg-empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .epg-empty i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* ========== LOADING ========== */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            gap: 20px;
        }

        .loading-screen i {
            font-size: 3rem;
            animation: spin 1s linear infinite;
            color: var(--accent);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1400px) {
            .groups-sidebar { width: 280px; }
            .channel-sidebar { width: 350px; }
        }

        @media (max-width: 1200px) {
            .groups-sidebar { 
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                border-right: 4px solid var(--accent);
                border-left: none;
            }
            .groups-sidebar.open {
                transform: translateX(0);
            }
            .channel-sidebar {
                width: 320px;
            }
        }

        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .channel-sidebar {
                width: 100%;
                height: 40%;
                border-left: none;
                border-bottom: 1px solid var(--border);
            }
            .groups-sidebar {
                width: 100%;
            }
            .epg-area {
                height: 200px;
            }
            .navbar {
                gap: 15px;
                padding: 0 15px;
            }
            .nav-center {
                gap: 8px;
            }
            .nav-btn, .categories-btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 600px) {
            .logo span {
                display: none;
            }
            .nav-center {
                display: none;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-satellite-dish"></i>
            <span>KAMAL PRO</span>
        </div>

        <div class="nav-center">
            <button class="nav-btn active" onclick="switchView('live')">
                <i class="fas fa-tv"></i>
                Live TV
            </button>
            <button class="nav-btn" onclick="switchView('epg')">
                <i class="fas fa-calendar-alt"></i>
                EPG Guide
            </button>
            <button class="categories-btn" id="categoriesBtn" onclick="toggleGroups()">
                <i class="fas fa-bars"></i>
                Categories
            </button>
        </div>

        <div class="nav-right">
            <div class="nav-icon" onclick="toggleSettings()">
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Groups Sidebar (Left side) -->
        <div class="groups-sidebar" id="groupsSidebar">
            <div class="groups-header">
                <div class="groups-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="groupSearch" placeholder="Search groups..." oninput="filterGroups(this.value)">
                </div>
            </div>
            <div class="groups-list" id="groupsList">
                <!-- Groups will be loaded here -->
            </div>
        </div>

        <!-- Channel List (Middle) -->
        <div class="channel-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <i class="fas fa-list"></i>
                    <span id="listTitle">All Channels</span>
                </div>
                <div class="channel-count" id="channelCount">0 کەناڵ</div>
            </div>
            <div class="channel-list" id="channelList">
                <div class="loading-screen">
                    <i class="fas fa-circle-notch"></i>
                    <div>کەناڵەکان دەبارێن...</div>
                </div>
            </div>
        </div>

        <!-- Right: Player + EPG -->
        <div class="right-content">
            <!-- Player -->
            <div class="player-area">
                <video id="videoPlayer" controls></video>
                <div class="player-placeholder" id="playerPlaceholder">
                    <i class="fas fa-tv"></i>
                    <div class="player-placeholder-text">تکایە کەناڵێک هەڵبژێرە</div>
                    <div class="loading-dots" id="loadingDots" style="display:none;">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
                <div class="player-controls" id="playerControls">
                    <div class="controls-row">
                        <button class="ctrl-btn" onclick="togglePlay()">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        <button class="ctrl-btn" onclick="toggleMute()">
                            <i class="fas fa-volume-up" id="muteIcon"></i>
                        </button>
                        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" onchange="setVolume(this.value)">
                        <div style="flex:1"></div>
                        <button class="ctrl-btn" onclick="toggleFullscreen()">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- EPG -->
            <div class="epg-area">
                <div class="epg-header">
                    <div class="epg-title">
                        <i class="fas fa-calendar-alt"></i>
                        بەرنامەی ڕۆژانە
                    </div>
                    <div class="epg-channel-name" id="epgChannelName">-</div>
                </div>
                <div class="epg-list" id="epgList">
                    <div class="epg-empty">
                        <i class="fas fa-info-circle"></i>
                        <div>کەناڵێک هەڵبژێرە بۆ بینینی بەرنامەکان</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const M3U_URL = 'https://xtream-ie.net/get.php?username=iptv2027&password=iptv2027&type=m3u_plus';
        const EPG_URL = 'https://xtream-ie.net/xmltv.php?username=iptv2027&password=iptv2027';

        let allChannels = [];
        let groups = {};
        let currentChannel = null;
        let currentGroup = null;
        let hls = null;
        let isPlaying = false;
        let currentView = 'live';
        let epgData = {};
        let favorites = JSON.parse(localStorage.getItem('kamal_favorites') || '[]');

        document.addEventListener('DOMContentLoaded', () => {
            loadChannels();
            loadEPGData();
            setupKeyboard();
            setupVideoEvents();
        });

        async function loadChannels() {
            try {
                const response = await fetch(M3U_URL);
                const data = await response.text();
                parseM3U(data);
                document.getElementById('channelCount').textContent = allChannels.length + ' کەناڵ';
                renderChannelList(allChannels);
                renderGroupsList();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('channelList').innerHTML = `
                    <div class="loading-screen">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div>هەڵە لە بارکردنی کەناڵەکان</div>
                    </div>
                `;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentGroup = 'گشتی';
            let currentChannel = null;
            let channelNum = 1;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const nameMatch = line.match(/,(.*)$/);

                    if (groupMatch) currentGroup = groupMatch[1] || 'گشتی';

                    if (!groups[currentGroup]) {
                        groups[currentGroup] = [];
                    }

                    currentChannel = {
                        num: channelNum++,
                        name: nameMatch ? nameMatch[1].trim() : 'کەناڵ',
                        logo: logoMatch ? logoMatch[1] : '',
                        group: currentGroup,
                        url: ''
                    };

                    groups[currentGroup].push(currentChannel);
                    allChannels.push(currentChannel);
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    currentChannel = null;
                }
            });
        }

        function renderGroupsList() {
            const list = document.getElementById('groupsList');
            list.innerHTML = '';

            // Favorites row
            const favRow = document.createElement('div');
            favRow.className = 'group-row favorites' + (currentGroup === 'favorites' ? ' active' : '');
            favRow.onclick = () => selectGroup('favorites');
            favRow.innerHTML = `
                <div class="group-name">
                    Favorites
                    <i class="fas fa-heart heart-icon"></i>
                </div>
                <div class="group-count">${favorites.length}</div>
            `;
            list.appendChild(favRow);

            // All channels row
            const allRow = document.createElement('div');
            allRow.className = 'group-row' + (currentGroup === null ? ' active' : '');
            allRow.onclick = () => selectGroup(null);
            allRow.innerHTML = `
                <div class="group-name">All channels</div>
                <div class="group-count">${allChannels.length}</div>
            `;
            list.appendChild(allRow);

            // Group rows
            Object.keys(groups).sort().forEach(groupName => {
                const count = groups[groupName].length;
                const row = document.createElement('div');
                row.className = 'group-row' + (currentGroup === groupName ? ' active' : '');
                row.dataset.name = groupName.toLowerCase();

                // Extract language prefix (AR, EN, etc.)
                const langMatch = groupName.match(/^([A-Z]{2})\s*/);
                const lang = langMatch ? langMatch[1] : '';
                const nameWithoutLang = lang ? groupName.substring(lang.length).trim() : groupName;

                row.innerHTML = `
                    <div class="group-flag">${lang}</div>
                    <div class="group-icon"><i class="fas fa-bolt"></i></div>
                    <div class="group-name">${nameWithoutLang}</div>
                    <div class="group-count">${count}</div>
                `;

                row.onclick = () => selectGroup(groupName);
                list.appendChild(row);
            });
        }

        function selectGroup(groupName) {
            currentGroup = groupName;

            // Update active states in groups list
            document.querySelectorAll('.group-row').forEach(row => row.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Filter and show channels
            let channelsToShow = [];
            let title = '';

            if (groupName === 'favorites') {
                channelsToShow = allChannels.filter(ch => favorites.includes(ch.name));
                title = 'Favorites';
                document.getElementById('channelCount').textContent = channelsToShow.length + ' دڵخواز';
            } else if (groupName === null) {
                channelsToShow = allChannels;
                title = 'All Channels';
                document.getElementById('channelCount').textContent = allChannels.length + ' کەناڵ';
            } else {
                channelsToShow = groups[groupName] || [];
                title = groupName;
                document.getElementById('channelCount').textContent = channelsToShow.length + ' کەناڵ';
            }

            document.getElementById('listTitle').textContent = title;
            renderChannelList(channelsToShow);

            // On mobile, close groups sidebar after selection
            if (window.innerWidth <= 1200) {
                document.getElementById('groupsSidebar').classList.remove('open');
            }
        }

        function filterGroups(query) {
            const rows = document.querySelectorAll('.group-row');
            const lowerQuery = query.toLowerCase();

            rows.forEach(row => {
                const name = row.dataset.name || '';
                const text = row.textContent.toLowerCase();
                if (text.includes(lowerQuery) || name.includes(lowerQuery)) {
                    row.style.display = 'flex';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        function toggleGroups() {
            const sidebar = document.getElementById('groupsSidebar');
            const btn = document.getElementById('categoriesBtn');
            sidebar.classList.toggle('open');
            btn.classList.toggle('active');
        }

        function renderChannelList(channels) {
            const list = document.getElementById('channelList');
            list.innerHTML = '';

            if (channels.length === 0) {
                list.innerHTML = `
                    <div class="loading-screen">
                        <i class="fas fa-inbox"></i>
                        <div>هیچ کەناڵێک نیە</div>
                    </div>
                `;
                return;
            }

            channels.forEach(channel => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.dataset.name = channel.name.toLowerCase();
                row.dataset.group = channel.group.toLowerCase();

                const logoHtml = channel.logo 
                    ? `<img src="${channel.logo}" alt="${channel.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-tv\'></i>'">`
                    : '<i class="fas fa-tv"></i>';

                const isFav = favorites.includes(channel.name);

                row.innerHTML = `
                    <div class="ch-number">${channel.num}</div>
                    <div class="ch-logo">${logoHtml}</div>
                    <div class="ch-name">${channel.name}</div>
                    <div class="ch-settings" onclick="event.stopPropagation(); toggleFavoriteChannel('${channel.name}')">
                        <i class="${isFav ? 'fas' : 'far'} fa-heart" style="color:${isFav ? 'var(--accent)' : ''}"></i>
                    </div>
                `;

                row.onclick = () => playChannel(channel, row);
                list.appendChild(row);
            });
        }

        function toggleFavoriteChannel(channelName) {
            const index = favorites.indexOf(channelName);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(channelName);
            }
            localStorage.setItem('kamal_favorites', JSON.stringify(favorites));

            // Refresh groups list to update count
            renderGroupsList();

            // If currently viewing favorites, refresh
            if (currentGroup === 'favorites') {
                const favChannels = allChannels.filter(ch => favorites.includes(ch.name));
                renderChannelList(favChannels);
                document.getElementById('channelCount').textContent = favChannels.length + ' دڵخواز';
            } else {
                // Update heart icon
                const rows = document.querySelectorAll('.channel-row');
                rows.forEach(row => {
                    const nameEl = row.querySelector('.ch-name');
                    if (nameEl && nameEl.textContent === channelName) {
                        const heartIcon = row.querySelector('.ch-settings i');
                        const isFav = favorites.includes(channelName);
                        heartIcon.className = isFav ? 'fas fa-heart' : 'far fa-heart';
                        heartIcon.style.color = isFav ? 'var(--accent)' : '';
                    }
                });
            }
        }

        function playChannel(channel, rowElement) {
            if (!channel || !channel.url) return;

            currentChannel = channel;

            // Update active state
            document.querySelectorAll('.channel-row').forEach(r => r.classList.remove('active'));
            if (rowElement) rowElement.classList.add('active');

            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('playerPlaceholder');
            const loadingDots = document.getElementById('loadingDots');

            placeholder.style.display = 'none';
            loadingDots.style.display = 'flex';

            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    isPlaying = true;
                    updatePlayIcon();
                    loadingDots.style.display = 'none';
                });
                hls.on(Hls.Events.ERROR, () => {
                    loadingDots.style.display = 'none';
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.play();
                isPlaying = true;
                updatePlayIcon();
                loadingDots.style.display = 'none';
            }

            // Update EPG
            document.getElementById('epgChannelName').textContent = channel.name;
            renderEPG(channel.name);
        }

        async function loadEPGData() {
            try {
                const response = await fetch(EPG_URL);
                const data = await response.text();
                parseEPG(data);
            } catch (e) {
                console.log('EPG load failed');
            }
        }

        function parseEPG(xmlData) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlData, "text/xml");
            const programmes = xmlDoc.querySelectorAll('programme');

            programmes.forEach(prog => {
                const channel = prog.getAttribute('channel');
                const start = prog.getAttribute('start');
                const stop = prog.getAttribute('stop');
                const title = prog.querySelector('title')?.textContent || 'بەرنامە';
                const desc = prog.querySelector('desc')?.textContent || '';

                if (!epgData[channel]) epgData[channel] = [];
                epgData[channel].push({ start, stop, title, desc });
            });
        }

        function renderEPG(channelName) {
            const epgList = document.getElementById('epgList');

            let channelEPG = null;
            for (let key in epgData) {
                if (key.toLowerCase().includes(channelName.toLowerCase()) || 
                    channelName.toLowerCase().includes(key.toLowerCase())) {
                    channelEPG = epgData[key];
                    break;
                }
            }

            if (!channelEPG || channelEPG.length === 0) {
                const now = new Date();
                const times = [];
                for (let i = -1; i < 4; i++) {
                    const t = new Date(now.getTime() + i * 60 * 60 * 1000);
                    times.push(t.toLocaleTimeString('en', {hour: '2-digit', minute: '2-digit', hour12: false}));
                }

                epgList.innerHTML = `
                    <div class="epg-row current">
                        <div class="epg-time">${times[1]}</div>
                        <div class="epg-program">پەخشی ڕاستەوخۆ - ${channelName}</div>
                        <div class="epg-status live">LIVE</div>
                    </div>
                    <div class="epg-row">
                        <div class="epg-time">${times[2]}</div>
                        <div class="epg-program">بەرنامەی داهاتوو</div>
                        <div class="epg-status next">داهاتوو</div>
                    </div>
                    <div class="epg-row">
                        <div class="epg-time">${times[3]}</div>
                        <div class="epg-program">بەرنامەی دواتر</div>
                        <div class="epg-status next">دواتر</div>
                    </div>
                    <div class="epg-row">
                        <div class="epg-time">${times[4]}</div>
                        <div class="epg-program">بەرنامەی دواتر</div>
                        <div class="epg-status next">دواتر</div>
                    </div>
                `;
                return;
            }

            epgList.innerHTML = '';
            const now = new Date();

            channelEPG.slice(0, 6).forEach((prog, index) => {
                const startTime = parseEPGTime(prog.start);
                const isCurrent = now >= startTime && now < parseEPGTime(prog.stop);

                const row = document.createElement('div');
                row.className = 'epg-row' + (isCurrent ? ' current' : '');
                row.innerHTML = `
                    <div class="epg-time">${formatTime(startTime)}</div>
                    <div class="epg-program">${prog.title}</div>
                    <div class="epg-status ${isCurrent ? 'live' : 'next'}">${isCurrent ? 'LIVE' : 'داهاتوو'}</div>
                `;
                epgList.appendChild(row);
            });
        }

        function parseEPGTime(str) {
            if (!str) return new Date();
            const year = str.substr(0, 4);
            const month = str.substr(4, 2) - 1;
            const day = str.substr(6, 2);
            const hour = str.substr(8, 2);
            const min = str.substr(10, 2);
            return new Date(year, month, day, hour, min);
        }

        function formatTime(date) {
            return date.toLocaleTimeString('en', {hour: '2-digit', minute: '2-digit', hour12: false});
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Video controls
        function setupVideoEvents() {
            const video = document.getElementById('videoPlayer');
            video.addEventListener('play', () => { isPlaying = true; updatePlayIcon(); });
            video.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); });
            video.addEventListener('volumechange', updateMuteIcon);
        }

        function togglePlay() {
            const video = document.getElementById('videoPlayer');
            if (video.paused) video.play();
            else video.pause();
        }

        function updatePlayIcon() {
            const icon = document.getElementById('playIcon');
            icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }

        function toggleMute() {
            const video = document.getElementById('videoPlayer');
            video.muted = !video.muted;
        }

        function updateMuteIcon() {
            const video = document.getElementById('videoPlayer');
            const icon = document.getElementById('muteIcon');
            const slider = document.getElementById('volSlider');
            slider.value = video.muted ? 0 : video.volume * 100;

            if (video.muted || video.volume === 0) {
                icon.className = 'fas fa-volume-mute';
            } else if (video.volume < 0.5) {
                icon.className = 'fas fa-volume-down';
            } else {
                icon.className = 'fas fa-volume-up';
            }
        }

        function setVolume(value) {
            const video = document.getElementById('videoPlayer');
            video.volume = value / 100;
            video.muted = false;
            updateMuteIcon();
        }

        function toggleFullscreen() {
            const player = document.querySelector('.player-area');
            if (!document.fullscreenElement) {
                player.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleSettings() {
            alert('ڕێکخستنەکان');
        }

        // Keyboard
        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                const video = document.getElementById('videoPlayer');

                switch(e.code) {
                    case 'Space':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'KeyM':
                        toggleMute();
                        break;
                    case 'KeyF':
                        toggleFullscreen();
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        navigateChannel(-1);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        navigateChannel(1);
                        break;
                }
            });
        }

        function navigateChannel(dir) {
            const rows = Array.from(document.querySelectorAll('.channel-row')).filter(r => r.style.display !== 'none');
            const activeIndex = rows.findIndex(r => r.classList.contains('active'));
            const newIndex = activeIndex + dir;

            if (newIndex >= 0 && newIndex < rows.length) {
                rows[newIndex].click();
                rows[newIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
