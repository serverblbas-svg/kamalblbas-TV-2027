<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMAL PRO ULTRA - IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --bg-light: #141414;
            --bg-card: #1a1a1a;
            --bg-hover: #222222;
            --bg-active: #ffffff;
            --border: #2a2a2a;
            --border-active: #ff3333;
            --text: #ffffff;
            --text-muted: #888888;
            --text-dark: #555555;
            --accent: #ff3333;
            --accent-glow: rgba(255, 51, 51, 0.3);
            --green: #00c853;
            --blue: #2962ff;
            --orange: #ff9800;
            --purple: #9c27b0;
            --cyan: #00bcd4;
            --yellow: #ffeb3b;
            --pink: #e91e63;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ========== TOP NAVBAR ========== */
        .navbar {
            height: 60px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 25px;
            gap: 30px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.5rem;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .nav-btn {
            padding: 8px 24px;
            border-radius: 25px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            color: var(--text);
            background: var(--bg-card);
        }

        .nav-btn.active {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .categories-btn {
            padding: 8px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .categories-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .categories-btn.active {
            background: var(--bg-active);
            color: #000;
            border-color: var(--bg-active);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .nav-icon:hover {
            background: var(--bg-card);
            color: var(--text);
        }

        /* ========== MAIN LAYOUT ========== */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ========== GROUPS SIDEBAR (Left side) ========== */
        .groups-sidebar {
            width: 320px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .groups-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .groups-search {
            flex: 1;
            position: relative;
        }

        .groups-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .groups-search input::placeholder {
            color: var(--text-muted);
        }

        .groups-search i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .groups-list::-webkit-scrollbar {
            width: 5px;
        }

        .groups-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .group-row {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .group-row::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 0;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        .group-row:hover {
            background: var(--bg-card);
        }

        .group-row:hover::before {
            width: 4px;
        }

        .group-row.active {
            background: linear-gradient(90deg, rgba(255,51,51,0.15), var(--bg-card));
            border-right: 3px solid var(--accent);
        }

        .group-row.active::before {
            width: 4px;
        }

        .group-row.active .group-name {
            color: var(--accent);
            font-weight: 700;
        }

        .group-row.active .group-count {
            background: var(--accent);
            color: white;
        }

        .group-flag {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 30px;
        }

        .group-icon {
            color: var(--orange);
            font-size: 0.9rem;
        }

        .group-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.3s;
        }

        .group-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            background: var(--bg-hover);
            padding: 3px 10px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        /* Favorites row special */
        .group-row.favorites .group-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-row.favorites .heart-icon {
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* ========== CHANNEL LIST (Middle) ========== */
        .channel-sidebar {
            width: 420px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channel-count {
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .channel-search-box {
            margin-top: 10px;
        }

        .channel-search-box input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .channel-search-box input::placeholder {
            color: var(--text-muted);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-list::-webkit-scrollbar {
            width: 5px;
        }

        .channel-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .channel-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            gap: 12px;
            position: relative;
            border: 2px solid transparent;
        }

        .channel-row:hover {
            background: var(--bg-card);
        }

        .channel-row.active {
            background: var(--text);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), 0 4px 15px rgba(255, 51, 51, 0.2);
            transform: scale(1.02);
            z-index: 2;
        }

        .channel-row.active .ch-number,
        .channel-row.active .ch-name {
            color: #000;
            font-weight: 700;
        }

        .channel-row.active .ch-settings {
            color: #000;
        }

        .ch-number {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 35px;
            text-align: center;
        }

        .ch-logo {
            width: 50px;
            height: 35px;
            border-radius: 6px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .ch-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 3px;
        }

        .ch-logo i {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* Auto-generated logo */
        .ch-logo.auto-logo {
            background: linear-gradient(135deg, var(--accent), var(--orange));
            color: white;
            font-weight: 800;
            font-size: 0.8rem;
            text-align: center;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ch-logo .auto-text {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: white;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .ch-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-settings {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            opacity: 0;
        }

        .channel-row:hover .ch-settings {
            opacity: 1;
        }

        .channel-row.active .ch-settings {
            opacity: 1;
        }

        .ch-settings:hover {
            background: rgba(0,0,0,0.1);
        }

        /* ========== RIGHT CONTENT (Player + EPG) ========== */
        .right-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
            min-width: 0;
        }

        /* Player Area */
        .player-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            gap: 20px;
            z-index: 5;
        }

        .player-placeholder i {
            font-size: 4rem;
            color: var(--text-dark);
        }

        .player-placeholder-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .loading-dots .dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .loading-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Player Controls Overlay */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 40px 20px 15px;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .player-area:hover .player-controls {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .ctrl-btn:hover {
            background: var(--accent);
            transform: scale(1.1);
        }

        .vol-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* ========== EPG SECTION ========== */
        .epg-area {
            height: 280px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .epg-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .epg-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .epg-title i {
            color: var(--accent);
        }

        .epg-channel-name {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 600;
        }

        .epg-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .epg-list::-webkit-scrollbar {
            width: 5px;
        }

        .epg-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .epg-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-radius: 10px;
            gap: 20px;
            transition: all 0.3s;
            border-right: 3px solid transparent;
        }

        .epg-row:hover {
            background: var(--bg-hover);
            border-right-color: var(--accent);
        }

        .epg-row.current {
            background: rgba(255, 51, 51, 0.1);
            border-right-color: var(--accent);
        }

        .epg-time {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            min-width: 100px;
            font-family: 'Courier New', monospace;
        }

        .epg-program {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 500;
        }

        .epg-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }

        .epg-status.live {
            background: rgba(0, 200, 83, 0.15);
            color: var(--green);
            border: 1px solid rgba(0, 200, 83, 0.3);
        }

        .epg-status.next {
            background: var(--bg-hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* Empty EPG */
        .epg-empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .epg-empty i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* ========== SETTINGS MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .setting-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stream-format-btns {
            display: flex;
            gap: 8px;
        }

        .format-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .format-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .format-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ========== LOADING ========== */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            gap: 20px;
        }

        .loading-screen i {
            font-size: 3rem;
            animation: spin 1s linear infinite;
            color: var(--accent);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1400px) {
            .groups-sidebar { width: 280px; }
            .channel-sidebar { width: 350px; }
        }

        @media (max-width: 1200px) {
            .groups-sidebar { 
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 50;
                transform: translateX(100%);
                transition: transform 0.3s ease;
                border-left: 4px solid var(--accent);
                border-right: none;
            }
            .groups-sidebar.open {
                transform: translateX(0);
            }
            .channel-sidebar {
                width: 320px;
            }
        }

        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .channel-sidebar {
                width: 100%;
                height: 35%;
                min-height: 250px;
                border-left: none;
                border-bottom: 1px solid var(--border);
            }
            .groups-sidebar {
                width: 100%;
            }
            .groups-sidebar.open {
                width: 85%;
            }
            .epg-area {
                height: 200px;
            }
            .navbar {
                gap: 15px;
                padding: 0 15px;
            }
            .nav-center {
                gap: 8px;
            }
            .nav-btn, .categories-btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 600px) {
            .logo span { display: none; }
            .nav-center { display: none; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-satellite-dish"></i>
            <span>KAMAL PRO</span>
        </div>

        <div class="nav-center">
            <button class="nav-btn active" id="liveBtn" onclick="switchView('live')">
                <i class="fas fa-tv"></i>
                Live TV
            </button>
            <button class="nav-btn" id="epgBtn" onclick="switchView('epg')">
                <i class="fas fa-calendar-alt"></i>
                EPG Guide
            </button>
            <button class="categories-btn" id="categoriesBtn" onclick="toggleGroups()">
                <i class="fas fa-bars"></i>
                Categories
            </button>
        </div>

        <div class="nav-right">
            <div class="nav-icon" onclick="toggleSettings()">
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Groups Sidebar (Left side) -->
        <div class="groups-sidebar" id="groupsSidebar">
            <div class="groups-header">
                <div class="groups-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="groupSearch" placeholder="گەڕان بۆ گرووپەکان..." oninput="filterGroups(this.value)">
                </div>
            </div>
            <div class="groups-list" id="groupsList">
                <!-- Groups will be loaded here -->
            </div>
        </div>

        <!-- Channel List (Middle) -->
        <div class="channel-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <div class="sidebar-title">
                        <i class="fas fa-list"></i>
                        <span id="listTitle">هەموو کەناڵەکان</span>
                    </div>
                    <div class="channel-count" id="channelCount">0 کەناڵ</div>
                </div>
                <div class="channel-search-box">
                    <input type="text" id="channelSearch" placeholder="گەڕان بۆ کەناڵ..." oninput="filterChannels(this.value)">
                </div>
            </div>
            <div class="channel-list" id="channelList">
                <div class="loading-screen">
                    <i class="fas fa-circle-notch"></i>
                    <div>کەناڵەکان دەبارێن...</div>
                </div>
            </div>
        </div>

        <!-- Right: Player + EPG -->
        <div class="right-content">
            <!-- Player -->
            <div class="player-area">
                <video id="videoPlayer"></video>
                <div class="player-placeholder" id="playerPlaceholder">
                    <i class="fas fa-tv" id="placeholderIcon"></i>
                    <div class="player-placeholder-text" id="placeholderText">تکایە کەناڵێک هەڵبژێرە</div>
                    <div class="loading-dots" id="loadingDots" style="display:none;">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
                <div class="player-controls" id="playerControls">
                    <div class="controls-row">
                        <button class="ctrl-btn" onclick="togglePlay()">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        <button class="ctrl-btn" onclick="toggleMute()">
                            <i class="fas fa-volume-up" id="muteIcon"></i>
                        </button>
                        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
                        <div style="flex:1"></div>
                        <button class="ctrl-btn" onclick="toggleFullscreen()">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- EPG -->
            <div class="epg-area">
                <div class="epg-header">
                    <div class="epg-title">
                        <i class="fas fa-calendar-alt"></i>
                        بەرنامەی ڕۆژانە
                    </div>
                    <div class="epg-channel-name" id="epgChannelName">-</div>
                </div>
                <div class="epg-list" id="epgList">
                    <div class="epg-empty">
                        <i class="fas fa-info-circle"></i>
                        <div>کەناڵێک هەڵبژێرە بۆ بینینی بەرنامەکان</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-cog" style="color:var(--accent)"></i>
                    ڕێکخستنەکان
                </div>
                <button class="modal-close" onclick="toggleSettings()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="setting-row">
                <div>
                    <div class="setting-label">فۆرماتی سترێم</div>
                    <div class="setting-desc">جۆری فایلی پەخشکردنی کەناڵەکان هەڵبژێرە</div>
                </div>
                <div class="stream-format-btns">
                    <button class="format-btn" id="fmtM3U8" onclick="setStreamFormat('m3u8')">M3U8 (HLS)</button>
                    <button class="format-btn" id="fmtTS" onclick="setStreamFormat('ts')">MPEG-TS</button>
                    <button class="format-btn" id="fmtLiveTS" onclick="setStreamFormat('live_ts')">Live TS</button>
                </div>
            </div>

            <div class="setting-row">
                <div>
                    <div class="setting-label">دڵخوازەکان</div>
                    <div class="setting-desc">سڕینەوەی هەموو دڵخوازەکان</div>
                </div>
                <button class="format-btn" onclick="clearFavorites()" style="background:var(--accent);color:white;">
                    <i class="fas fa-trash"></i> سڕینەوە
                </button>
            </div>
        </div>
    </div>

    <script>
        // لینکە ڕاستەوخۆیەکان - بێ CORS Proxy
        const M3U_URL = 'https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus';
        const EPG_URL = 'https://xtream-ie.net/xmltv.php?username=serverblbas&password=serverblbas';

        let allChannels = [];
        let groups = {};
        let currentChannel = null;
        let currentGroup = null;
        let hls = null;
        let isPlaying = false;
        let currentView = 'live';
        let streamFormat = localStorage.getItem('kamal_stream_format') || 'm3u8';

        let favorites = [];
        try {
            favorites = JSON.parse(localStorage.getItem('kamal_favorites') || '[]');
        } catch(e) {
            favorites = [];
            localStorage.removeItem('kamal_favorites');
        }

        const video = document.getElementById('videoPlayer');

        document.addEventListener('DOMContentLoaded', () => {
            loadChannels();
            setupVideoEvents();
            setupKeyboardShortcuts();
            updateFormatButtons();
        });

        // ====== STREAM FORMAT FUNCTIONS ======
        function setStreamFormat(format) {
            streamFormat = format;
            localStorage.setItem('kamal_stream_format', format);
            updateFormatButtons();

            // ئەگەر کەناڵێک لە کاتی پەخشدانە، دووبارە پەخش بکەوە
            if (currentChannel) {
                playChannel(currentChannel);
            }
        }

        function updateFormatButtons() {
            document.getElementById('fmtM3U8').classList.toggle('active', streamFormat === 'm3u8');
            document.getElementById('fmtTS').classList.toggle('active', streamFormat === 'ts');
            document.getElementById('fmtLiveTS').classList.toggle('active', streamFormat === 'live_ts');
        }

        function convertStreamUrl(originalUrl, format) {
            // ئەگەر URL پێشتر .m3u8 یان .ts تێدایە، وەک خۆی بەکاربهێنە
            if (originalUrl.includes('.m3u8') || originalUrl.includes('.ts')) {
                if (format === 'm3u8') {
                    return originalUrl.replace('.ts', '.m3u8');
                } else if (format === 'ts') {
                    return originalUrl.replace('.m3u8', '.ts');
                }
                return originalUrl;
            }

            // بۆ URLی Xtream Codes: /live/username/password/stream_id
            try {
                const url = new URL(originalUrl);
                const parts = url.pathname.split('/').filter(p => p.length > 0);

                if (parts.length < 3) return originalUrl;

                const streamId = parts[parts.length - 1];
                const password = parts[parts.length - 2];
                const username = parts[parts.length - 3];
                const folder = parts[parts.length - 4] || 'live';

                if (format === 'm3u8') {
                    url.pathname = `/${folder}/${username}/${password}/${streamId}.m3u8`;
                } else if (format === 'ts') {
                    url.pathname = `/${folder}/${username}/${password}/${streamId}.ts`;
                } else if (format === 'live_ts') {
                    url.pathname = `/${folder}/${username}/${password}/${streamId}`;
                }

                return url.toString();
            } catch (e) {
                return originalUrl;
            }
        }

        async function loadChannels() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error('تۆڕەکە وەڵامی نەبوو');
                const data = await response.text();
                parseM3U(data);
                document.getElementById('channelCount').textContent = allChannels.length + ' کەناڵ';
                renderChannelList(allChannels);
                renderGroupsList();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('channelList').innerHTML = `
                    <div class="loading-screen">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div>هەڵە لە بارکردنی کەناڵەکان ڕوویدا</div>
                        <div style="font-size:0.85rem;margin-top:10px;">${error.message}</div>
                    </div>
                `;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentGroupName = 'گشتی';
            let activeChan = null;
            let channelNum = 1;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const nameMatch = line.match(/,(.*)$/);

                    if (groupMatch && groupMatch[1]) currentGroupName = groupMatch[1];

                    if (!groups[currentGroupName]) {
                        groups[currentGroupName] = [];
                    }

                    activeChan = {
                        num: channelNum++,
                        name: nameMatch ? nameMatch[1].trim() : 'کەناڵ',
                        logo: logoMatch ? logoMatch[1] : '',
                        group: currentGroupName,
                        url: ''
                    };
                } else if (line.startsWith('http') && activeChan) {
                    activeChan.url = line;
                    activeChan.originalUrl = line; // پاراستنی URLی ڕەسەن
                    groups[currentGroupName].push(activeChan);
                    allChannels.push(activeChan);
                    activeChan = null;
                }
            });
        }

        function generateAutoLogo(channelName) {
            const cleanName = channelName.replace(/[^a-zA-Z0-9\s]/g, '').trim();
            const words = cleanName.split(/\s+/).filter(w => w.length > 0);
            if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
            if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
            return 'TV';
        }

        function getChannelColor(name) {
            const colors = ['#ff3333', '#ff9800', '#00c853', '#2962ff', '#9c27b0', '#00bcd4', '#e91e63'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function renderGroupsList() {
            const list = document.getElementById('groupsList');
            list.innerHTML = '';

            // Favorites Group
            const favRow = document.createElement('div');
            favRow.className = 'group-row favorites' + (currentGroup === 'favorites' ? ' active' : '');
            favRow.onclick = () => selectGroup('favorites');
            favRow.innerHTML = `
                <div class="group-name">دڵخوازەکان <i class="fas fa-heart heart-icon"></i></div>
                <div class="group-count">${favorites.length}</div>
            `;
            list.appendChild(favRow);

            // All Channels Group
            const allRow = document.createElement('div');
            allRow.className = 'group-row' + (currentGroup === null ? ' active' : '');
            allRow.onclick = () => selectGroup(null);
            allRow.innerHTML = `
                <div class="group-name">هەموو کەناڵەکان</div>
                <div class="group-count">${allChannels.length}</div>
            `;
            list.appendChild(allRow);

            // Dynamically parsed groups
            Object.keys(groups).sort().forEach(groupName => {
                const count = groups[groupName].length;
                if(count === 0) return;
                const row = document.createElement('div');
                row.className = 'group-row' + (currentGroup === groupName ? ' active' : '');

                const langMatch = groupName.match(/^([A-Z]{2})\s*/);
                const lang = langMatch ? langMatch[1] : '';
                const nameWithoutLang = lang ? groupName.substring(lang.length).trim() : groupName;

                row.onclick = () => selectGroup(groupName);
                row.innerHTML = `
                    <div class="group-flag">${lang || '📺'}</div>
                    <div class="group-icon"><i class="fas fa-bolt"></i></div>
                    <div class="group-name">${nameWithoutLang}</div>
                    <div class="group-count">${count}</div>
                `;
                list.appendChild(row);
            });
        }

        function selectGroup(groupName) {
            currentGroup = groupName;
            renderGroupsList();

            let filtered = [];
            if (groupName === 'favorites') {
                filtered = allChannels.filter(c => favorites.includes(c.url));
                document.getElementById('listTitle').textContent = 'دڵخوازەکان';
            } else if (groupName === null) {
                filtered = allChannels;
                document.getElementById('listTitle').textContent = 'هەموو کەناڵەکان';
            } else {
                filtered = groups[groupName] || [];
                document.getElementById('listTitle').textContent = groupName;
            }

            document.getElementById('channelCount').textContent = filtered.length + ' کەناڵ';
            renderChannelList(filtered);

            if (window.innerWidth <= 1200) {
                toggleGroups();
            }
        }

        function renderChannelList(channels) {
            const list = document.getElementById('channelList');
            list.innerHTML = '';

            if(channels.length === 0) {
                list.innerHTML = '<div class="loading-screen"><div>هیچ کەناڵێک نەدۆزرایەوە</div></div>';
                return;
            }

            channels.forEach(chan => {
                const isFav = favorites.includes(chan.url);
                const row = document.createElement('div');
                row.className = 'channel-row' + (currentChannel && currentChannel.url === chan.url ? ' active' : '');

                let logoContent = chan.logo ? `<img src="${chan.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">` : '';
                let styleBg = chan.logo ? '' : `style="background:${getChannelColor(chan.name)}"`;

                row.innerHTML = `
                    <div class="ch-number">${chan.num}</div>
                    <div class="ch-logo ${chan.logo ? '' : 'auto-logo'}" ${styleBg}>
                        ${logoContent}
                        <span class="auto-text" style="${chan.logo ? 'display:none' : ''}">${generateAutoLogo(chan.name)}</span>
                    </div>
                    <div class="ch-name">${chan.name}</div>
                    <div class="ch-settings" onclick="toggleFavorite(event, '${chan.url}')">
                        <i class="${isFav ? 'fas' : 'far'} fa-heart" style="color:${isFav ? 'var(--accent)' : ''}"></i>
                    </div>
                `;
                row.onclick = () => playChannel(chan);
                list.appendChild(row);
            });
        }

        function playChannel(chan) {
            currentChannel = chan;

            // نیشاندانی بارکردن
            document.getElementById('playerPlaceholder').style.display = 'flex';
            document.getElementById('loadingDots').style.display = 'flex';
            document.getElementById('placeholderText').textContent = 'کەناڵەکە بار دەکرێت... (' + streamFormat.toUpperCase() + ')';
            document.getElementById('placeholderIcon').style.display = 'none';

            // UI Upgrades
            document.getElementById('epgChannelName').textContent = chan.name;

            // Mark active row
            const rows = document.querySelectorAll('.channel-row');
            rows.forEach((r, idx) => {
                r.classList.remove('active');
                if(chan.num === parseInt(r.querySelector('.ch-number').textContent)) {
                    r.classList.add('active');
                    r.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });

            // گۆڕینی URL بەپێی فۆرماتی هەڵبژێردراو
            const streamUrl = convertStreamUrl(chan.originalUrl || chan.url, streamFormat);
            console.log('Playing URL:', streamUrl, 'Format:', streamFormat);

            // Start Playback
            if (streamFormat === 'm3u8' && Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    enableWorker: true
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    isPlaying = true;
                    updatePlayIcon();
                    document.getElementById('playerPlaceholder').style.display = 'none';
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error('HLS Error:', data);
                    if (data.fatal) {
                        showPlayerError('کەناڵەکە بەردەست نییە (' + streamFormat + ')');
                    }
                });
            } else {
                // بۆ MPEG-TS و Live TS
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    isPlaying = true;
                    updatePlayIcon();
                    document.getElementById('playerPlaceholder').style.display = 'none';
                });
                video.addEventListener('error', (e) => {
                    console.error('Video Error:', e);
                    showPlayerError('کەناڵەکە بەردەست نییە (' + streamFormat + ')');
                });
            }

            renderFakeEPG(chan.name);
        }

        function showPlayerError(msg) {
            document.getElementById('placeholderText').textContent = msg;
            document.getElementById('loadingDots').style.display = 'none';
            document.getElementById('placeholderIcon').style.display = 'block';
            document.getElementById('placeholderIcon').className = 'fas fa-exclamation-triangle';
            document.getElementById('placeholderIcon').style.color = 'var(--accent)';
            document.getElementById('playerPlaceholder').style.display = 'flex';
        }

        function togglePlay() {
            if(!currentChannel) return;
            if (isPlaying) {
                video.pause();
                isPlaying = false;
            } else {
                video.play();
                isPlaying = true;
            }
            updatePlayIcon();
        }

        function updatePlayIcon() {
            const icon = document.getElementById('playIcon');
            if(isPlaying) {
                icon.className = 'fas fa-pause';
            } else {
                icon.className = 'fas fa-play';
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteIcon').className = video.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
            document.getElementById('volSlider').value = video.muted ? 0 : video.volume * 100;
        }

        function setVolume(val) {
            video.volume = val / 100;
            video.muted = (val == 0);
            document.getElementById('muteIcon').className = video.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
        }

        function toggleFullscreen() {
            const playerArea = document.querySelector('.player-area');
            if (!document.fullscreenElement) {
                playerArea.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function toggleFavorite(e, url) {
            e.stopPropagation();
            const index = favorites.indexOf(url);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(url);
            }
            localStorage.setItem('kamal_favorites', JSON.stringify(favorites));

            renderGroupsList();
            if(currentGroup === 'favorites') {
                selectGroup('favorites');
            } else {
                let currentList = currentGroup ? groups[currentGroup] : allChannels;
                renderChannelList(currentList);
            }
        }

        function clearFavorites() {
            favorites = [];
            localStorage.removeItem('kamal_favorites');
            renderGroupsList();
            if(currentGroup === 'favorites') {
                selectGroup(null);
            }
            alert('هەموو دڵخوازەکان سڕانەوە!');
        }

        function filterGroups(val) {
            const lower = val.toLowerCase();
            const rows = document.querySelectorAll('#groupsList .group-row');
            rows.forEach(r => {
                const name = r.querySelector('.group-name').textContent.toLowerCase();
                r.style.display = name.includes(lower) ? 'flex' : 'none';
            });
        }

        function filterChannels(val) {
            const lower = val.toLowerCase();
            const rows = document.querySelectorAll('.channel-row');
            rows.forEach(r => {
                const name = r.querySelector('.ch-name').textContent.toLowerCase();
                r.style.display = name.includes(lower) ? 'flex' : 'none';
            });
        }

        function toggleGroups() {
            const sidebar = document.getElementById('groupsSidebar');
            sidebar.classList.toggle('open');
            document.getElementById('categoriesBtn').classList.toggle('active');
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('liveBtn').classList.toggle('active', view === 'live');
            document.getElementById('epgBtn').classList.toggle('active', view === 'epg');
        }

        function renderFakeEPG(channelName) {
            const list = document.getElementById('epgList');
            list.innerHTML = `
                <div class="epg-row current">
                    <div class="epg-time">17:00 - 19:00</div>
                    <div class="epg-program">پەخشی ڕاستەوخۆی ${channelName}</div>
                    <span class="epg-status live">ڕاستەوخۆ</span>
                </div>
                <div class="epg-row">
                    <div class="epg-time">19:00 - 20:30</div>
                    <div class="epg-program">فیلمی دۆکیۆمێنتاری یان دراما</div>
                    <span class="epg-status next">دواتر</span>
                </div>
                <div class="epg-row">
                    <div class="epg-time">20:30 - 22:00</div>
                    <div class="epg-program">بەرنامەی شەوانە</div>
                    <span class="epg-status next">دواتر</span>
                </div>
            `;
        }

        function setupVideoEvents() {
            video.addEventListener('play', () => { isPlaying = true; updatePlayIcon(); });
            video.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); });
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
                if (e.code === 'KeyM') toggleMute();
                if (e.code === 'KeyF') toggleFullscreen();
                if (e.code === 'ArrowUp') { 
                    e.preventDefault(); 
                    video.volume = Math.min(1, video.volume + 0.1); 
                    setVolume(video.volume * 100);
                }
                if (e.code === 'ArrowDown') { 
                    e.preventDefault(); 
                    video.volume = Math.max(0, video.volume - 0.1); 
                    setVolume(video.volume * 100);
                }
            });
        }

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('active');
        }
    </script>
</body>
</html>
